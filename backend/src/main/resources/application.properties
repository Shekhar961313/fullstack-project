# ============================================
# Cloud Store - Application Configuration
# ============================================

# Server port (backend runs on 8080)
server.port=8080

# ---- H2 In-Memory Database ----
# Data resets when server restarts (good for learning)
spring.datasource.url=jdbc:h2:mem:cloudstore
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA will auto-create database tables from our Entity classes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# ---- File Upload Settings ----
# Maximum file size: 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Where uploaded files are stored on disk
file.upload-dir=./uploads
